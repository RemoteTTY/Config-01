<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Founding Engineer — Apply</title>
    <style>
      :root { color-scheme: light; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; margin: 0; }
      main { max-width: 760px; margin: 0 auto; padding: 40px 20px; }
      h1 { font-size: 28px; margin: 0 0 8px; }
      p { line-height: 1.5; color: #222; }
      .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; background: #fff; }
      .btn { display: inline-block; padding: 12px 16px; border-radius: 10px; background: #111827; color: #fff; text-decoration: none; font-weight: 600; }
      .muted { color: #4b5563; font-size: 14px; }
      code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Founding Engineer — EverybodyIsaNewsCritic</h1>
      <p class="muted">Quickest intake: email. This page adapts tracking based on <code>?src=</code>.</p>

      <div class="card">
        <p>
          Email <strong id="apply-email"></strong> with:
          <br />- Your name
          <br />- LinkedIn + GitHub
          <br />- 3–5 sentences on why you’re a fit
        </p>

        <p><a id="apply-link" class="btn" href="#">Apply by email</a></p>

        <p class="muted">
          Tracking: add <code>?src=linkedin</code> or <code>?src=x</code> to this page URL.
        </p>
      </div>

      <script>
        (function () {
          const baseLocalPart = "david.dery";
          const params = new URLSearchParams(window.location.search);
          const src = (params.get("src") || "").trim();
          const tag = src ? `founding-engineer-${src}` : "founding-engineer";

          const to = `${baseLocalPart}+${tag}@gmail.com`;
          const subject = "Founding Engineer Application";
          const body = "Name:\nLinkedIn:\nGitHub:\n\nWhy I'm a fit:\n";

          const mailto = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

          document.getElementById("apply-email").textContent = to;
          document.getElementById("apply-link").setAttribute("href", mailto);
        })();
      </script>
    </main>
  </body>
</html>
